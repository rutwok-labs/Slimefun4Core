    "26.0.2": ""
    "26.0.1": ""
    "1.21.11": "https://raw.githubusercontent.com/rutwok-labs/SF4-Addons/main/Addons/java/core/api/config/addonmanager.yml"
    "1.20.4": ""
    "1.19.4": ""
  interval-minutes: 3
  fallback-to-local-on-empty: true
  fallback-to-local-on-failure: true

