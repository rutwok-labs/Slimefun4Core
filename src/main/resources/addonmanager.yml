# SF4 Addon Manager - Cloud Configuration
# ---------------------------------------
# Multi-version URLs: fill in the URL for each SF4 build tag.
# Leave blank ("") for versions not yet packaged.
# The plugin auto-detects the running server version and uses the matching URL.

cloud-sync:
  enabled: true
  url: "https://raw.githubusercontent.com/rutwok-labs/SF4-Addons/main/Addons/java/core/api/config/addonmanager.yml"
